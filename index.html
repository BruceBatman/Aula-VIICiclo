<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VII Ciclo - Educación Inicial y Primaria</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary: #0ea5e9;
            --secondary: #10b981;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #22c55e;
            --incorrect: #ef4444;
            --onpe-green: #1e4d41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area h1 {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .logo-area span {
            font-size: 0.85rem;
            background: #334155;
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-main);
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
            background-color: #334155;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .hero-invitation {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .hero-invitation::before {
            content: '🎉';
            position: absolute;
            font-size: 8rem;
            opacity: 0.1;
            right: -20px;
            bottom: -20px;
        }

        .badge-live {
            background-color: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .hero-invitation h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .event-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            min-width: 200px;
        }

        .detail-box i {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .section-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .timeline-item {
            display: flex;
            gap: 15px;
            padding-left: 15px;
            border-left: 3px solid var(--primary);
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 5px;
            width: 13px;
            height: 13px;
            background-color: var(--bg-dark);
            border: 3px solid var(--primary);
            border-radius: 50%;
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: bold;
        }

        .tabs-container { margin-top: 15px; }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: #1e293b;
            padding: 5px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: #fff;
        }

        .tab-content {
            display: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .tab-content.active { display: block; }

        .student-list { list-style: none; }

        .student-list li {
            padding: 10px 15px;
            background: #111827;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #4b5563;
            font-size: 0.95rem;
        }

        .org-card {
            background: #111827;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #334155;
        }

        .org-role {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .org-name {
            font-size: 1.05rem;
            font-weight: bold;
            margin-top: 2px;
        }

        .org-birthday {
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .birthday-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .birthday-grid { grid-template-columns: 1fr; }
        }

        .birthday-month-box {
            background: #111827;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .birthday-month-title {
            color: var(--accent);
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px dashed #334155;
            padding-bottom: 5px;
        }

        .birthday-list { list-style: none; }

        .birthday-list li {
            font-size: 0.9rem;
            padding: 5px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
        }

        .birthday-date {
            color: var(--primary);
            font-weight: bold;
            margin-right: 5px;
        }

        .btn-launch-tool {
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-orange {
            background: linear-gradient(135deg, #b91c1c 0%, #ea580c 100%);
            box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3);
        }
        .btn-orange:hover {
            transform: scale(1.01);
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
        }

        .btn-green {
            background: linear-gradient(135deg, #047857 0%, #10b981 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-green:hover {
            transform: scale(1.01);
            background: linear-gradient(135deg, #059669 0%, #34d399 100%);
        }

        .btn-purple {
            background: linear-gradient(135deg, #6d28d9 0%, #a855f7 100%);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        .btn-purple:hover {
            transform: scale(1.01);
            background: linear-gradient(135deg, #7c3aed 0%, #c084fc 100%);
        }

        .fullscreen-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19;
            z-index: 9999;
            overflow-y: auto;
            padding: 30px;
            color: #e2e8f0;
        }

        .view-header {
            background-color: #111827;
            border: 1px solid #1e293b;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .timer-box {
            background: #1e293b;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
            border: 1px solid #475569;
        }

        .question-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }

        .options-list {
            list-style: none;
        }

        .options-list li {
            background: #0f172a;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #334155;
            transition: 0.2s;
        }

        .options-list li:hover {
            background: #1e3
