<script>
    // ==========================================
    // MANEJADOR CENTRALIZADO DE ENRUTAMIENTO
    // ==========================================
    function abrirHerramienta(tipo) {
        const currentUrl = window.location.href.split('?')[0];
        window.open(currentUrl + '?mode=' + tipo, '_blank');
    }

    // Leer los parámetros URL al cargar la pestaña independiente
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        
        if (mode) {
            // Ocultar layout principal si se detecta un modo alternativo
            if (document.getElementById('main-content')) document.getElementById('main-content').style.display = 'none';
            if (document.getElementById('main-header')) document.getElementById('main-header').style.display = 'none';
            if (document.querySelector('footer')) document.querySelector('footer').style.display = 'none';
            
            // Mostrar la vista independiente correspondiente
            const pantallas = ['simulador', 'generador', 'buzon'];
            pantallas.forEach(p => {
                const el = document.getElementById(`${p}-pantalla`);
                if (el) el.style.display = p === mode ? 'block' : 'none';
            });
        }
    };

    // ==========================================
    // LÓGICA 2: GENERADOR DE SESIONES PEDAGÓGICAS
    // ==========================================
    function generarIdeaPedagogica() {
        const nivel = document.getElementById('gen-nivel').value;
        const resBox = document.getElementById('idea-resultado');
        if (!resBox) return;
        
        resBox.style.display = "block";
        
        if (nivel === 'inicial') {
            resBox.innerHTML = `
                <h4 style="color:var(--secondary); margin-bottom:10px;"><i class="fa-solid fa-lightbulb"></i> Enfoque: Juego Libre e Interacción (Socio-constructivismo)</h4>
                <p><strong>Situación Significativa:</strong> Los niños de 5 años muestran curiosidad constante por los insectos que aparecen en el jardín del instituto durante los recreos.</p>
                <p style="margin-top:10px;"><strong>Estrategia de Mediación:</strong> Organizar una salida de observación guiada provistos de lupas caseras. La docente no da respuestas absolutas; plantea preguntas reflexivas ("¿Por qué creen que se mueven así?", "¿Dónde vivirán?") promoviendo el lenguaje expresivo e hipótesis colectivas en asamblea.</p>
                <p style="margin-top:10px; font-size:0.85rem; color:var(--text-muted);"><em>Sugerencia: Conectar con el Principio de Corporeidad mediante juegos motrices que imiten los movimientos de la naturaleza observada.</em></p>
            `;
        } else {
            resBox.innerHTML = `
                <h4 style="color:var(--secondary); margin-bottom:10px;"><i class="fa-solid fa-shapes"></i> Enfoque: Área de Matemática - Geometría Dinámica (3er Grado)</h4>
                <p><strong>Situación Significativa:</strong> Los estudiantes confunden continuamente los perímetros con las áreas al medir superficies dentro de sus aulas.</p>
                <p style="margin-top:10px;"><strong>Secuencia Metodológica Concreta:</strong> 
                    <br>• <strong>Fase Concreta:</strong> Usar lana de colores para bordear las carpetas (Perímetro) y cubrirlas totalmente con hojas cuadrículas (Área).
                    <br>• <strong>Fase Gráfica:</strong> Dibujar en papelógrafos las figuras matemáticas construidas en el aula.
                    <br>• <strong>Fase Simbólica:</strong> Traducir las cuadrículas y bordes contados en fórmulas aritméticas de suma y multiplicación ($P = L+L+L+L$).
                </p>
            `;
        }
    }

    // ==========================================
    // LÓGICA 3: BUZÓN DE SUGERENCIAS
    // ==========================================
    function enviarMensajeBuzon() {
        const buzonInput = document.getElementById('buzon-mensaje');
        if (!buzonInput) return;
        
        const msg = buzonInput.value.trim();
        if(msg === "") {
            alert("Por favor, introduce un texto o propuesta antes de proceder con el envío.");
            return;
        }
        alert("¡Mensaje enviado con éxito a la base de datos de la delegatura! Bruce procesará tu propuesta a la brevedad.");
        buzonInput.value = "";
    }

    // ==========================================
    // LÓGICA 1: BANCO DE PREGUNTAS DEL SIMULADOR
    // ==========================================
    const bancoPreguntas = [
        {
            q: "1. ¿Qué día se celebra el cumpleaños de nuestro Delegado General, Bruce Junior Simón Vivanco?",
            options: ["A) El 15 de Mayo", "B) El 30 de Abril", "C) El 12 de Junio", "D) El 05 de Julio"],
            correct: 1,
            exp: "¡Correcto! El cumpleaños del delegado Bruce es el 30 de Abril."
        },
        {
            q: "2. ¿Cuándo se celebra el cumpleaños de la delegada de Educación Inicial, Flor Evelyn Valerio Mayta?",
            options: ["A) El 10 de Agosto", "B) El 24 de Mayo", "C) El 18 de Setiembre", "D) El 02 de Enero"],
            correct: 0,
            exp: "¡Correcto! Flor Valerio festeja su onomástico el 10 de Agosto."
        },
        {
            q: "3. ¿Quién fue la primera delegada elegida del ciclo al inicio de nuestra trayectoria académica?",
            options: ["A) Triana Serrano", "B) Geraldine Sanchez", "C) Carla Quispe Sueng", "D) Maricarmen Aburto"],
            correct: 2,
            exp: "¡Dato histórico del salón! La primera delegada del ciclo fue Carla."
        },
        {
            q: "4. ¿Qué día corresponde al cumpleaños de nuestro Vicepresidente del comité, Ederson Jampier Lozano Pérez?",
            options: ["A) El 28 de Junio", "B) El 07 de Junio", "C) El 15 de Mayo", "D) El 05 de Junio"],
            correct: 3,
            exp: "¡Exacto! El cumpleaños de Ederson es abriendo el mes, el 05 de Junio."
        },
        {
            q: "5. ¿Cuándo es el cumpleaños de nuestra Tesorera del Comité, Nuria Melissa Huari Villalobos?",
            options: ["A) El 10 de Junio", "B) El 01 de Mayo", "C) El 20 de Julio", "D) El 17 de Junio"],
            correct: 0,
            exp: "¡Correcto! El cumpleaños de Nuria es el 10 de Junio."
        },
        {
            q: "6. ¿Cuál es el enfoque fundamental del Socioconstructivismo aplicado en las aulas escolares?",
            options: ["A) El aprendizaje estructurado mecánicamente por repetición de conductas.", "B) La construcción del saber mediante la interacción colectiva y el andamiaje del docente.", "C) El trabajo individual hermético sin contacto con compañeros de clase.", "D) La asignación de calificaciones memorísticas instantáneas."],
            correct: 1,
            exp: "Vygotsky nos indica que la interacción sociocultural y el lenguaje estructuran el desarrollo cognitivo superior."
        },
        {
            q: "7. En el nivel de Educación Inicial, al ejecutar el 'Juego Libre en los Sectores', ¿qué labor cumple la docente?",
            options: ["A) Sentarse a avanzar registros administrativos ignorando las acciones lúdicas.", "B) Determinar de forma autoritaria qué sector usará cada niño.", "C) Calificar con escala vigesimal la creatividad estructural del juego.", "D) Observar de manera sistemática, mapear el progreso y mediar pedagógicamente de ser necesario."],
            correct: 3,
            exp: "El docente es observador y mediador estratégico, respetando fielmente la autonomía e iniciativa innata infantil."
        },
        {
            q: "8. Para el área de Matemática en Primaria (Resolución de Problemas), ¿cuál es la secuencia concreta de aprendizaje?",
            options: ["A) Nivel Concreto (manipulación), Nivel Gráfico (representación gráfica) y Nivel Simbólico (operación formal).", "B) Nivel Simbólico directo, priorizando la memorización de fórmulas complejas.", "C) Transcripción textual de la pizarra al cuaderno sin usar material didáctico.", "D) Resolución masiva de guías teóricas sin contextualización empírica."],
            correct: 0,
            exp: "La progresión didáctica matemática requiere pasar de la acción real con objetos a representaciones gráficas y finalmente al lenguaje simbólico abstracto."
        },
        {
            q: "9. ¿A qué definición responde el concepto de 'Conflicto Cognitivo' acuñado por Jean Piaget?",
            options: ["A) A disturbios conductuales graves dentro de la sesión de clase.", "B) Al desajuste mental que surge cuando los nuevos datos desafían los esquemas de saberes previos.", "C) Al desinterés apático generalizado por las explicaciones de la sesión.", "D) Al proceso de memorización automática a largo plazo."],
            correct: 1,
            exp: "El conflicto cognitivo genera una desestabilización mental positiva que impulsa al cerebro a asimilar y acomodar nuevos saberes."
        },
        {
            q: "10. ¿Cuál es el significado real del principio de Corporeidad en la Educación Inicial?",
            options: ["A) Someter a los infantes a rutinas físicas atléticas de alta competencia.", "B) Confinar al alumnado en carpetas sin opción de movimiento libre.", "C) Reconocer que el niño percibe, razona y expresa sus emociones con su cuerpo completo en movimiento.", "D) Analizar únicamente los datos de crecimiento de talla y peso de los estudiantes."],
            correct: 2,
            exp: "La corporeidad concibe al ser humano integral; los niños piensan y aprenden interactuando activamente con su entorno físico."
        },
        {
            q: "11. Dentro de los procesos pedagógicos, la estrategia ideal para activar los saberes previos consiste en:",
            options: ["A) Tomar una prueba escrita sorpresa calificada.", "B) Plantear preguntas retadoras, lluvias de ideas o diálogos abiertos basados en la experiencia vivencial del alumno.", "C) Dictar un marco conceptual amplio durante toda la primera hora de clase.", "D) Proyectar un documental extenso sin realizar interrupciones ni comentarios."],
            correct: 1,
            exp: "Los saberes previos emergen mejor mediante preguntas abiertas conectadas con las vivencias del contexto diario del estudiante."
        },
        {
            q: "12. En Comprensión Lectora para Primaria, ¿qué acción evalúa de manera fidedigna el nivel crítico-valorativo?",
            options: ["A) Localizar la fecha exacta mencionada en el segundo párrafo.", "B) Transcribir los nombres de todos los personajes del texto.", "C) Formular juicios sustentados sobre las intenciones del autor y la conducta moral de los personajes.", "D) Contar el número exacto de palabras leídas en un minuto."],
            correct: 2,
            exp: "El nivel crítico va más allá de lo literal e inferencial; demanda emitir opiniones sólidas fundamentando argumentos lógicos."
        },
        {
            q: "13. ¿Cuál es el fin prioritario de la retroalimentación oportuna en el modelo de Evaluación Formativa?",
            options: ["A) Clasificar a los estudiantes con etiquetas de rendimiento alto y bajo.", "B) Brindar orientación descriptiva que ayude al alumno a acortar la brecha entre su nivel actual y el estándar esperado de forma reflexiva.", "C) Justificar de manera legal la reprobación del periodo escolar.", "D) Publicar los errores de forma masiva en el aula para escarmiento grupal."],
            correct: 1,
            exp: "Retroalimentar formativamente ayuda al estudiante a autorregularse, identificando fallas y descubriendo caminos para solucionarlas."
        },
        {
            q: "14. ¿Qué teórico postuló el Aprendizaje Significativo, fundamentando que la nueva información se ancla con solidez en ideas anclas preexistentes?",
            options: ["A) B.F. Skinner", "B) Lev Vygotsky", "C) Jean Piaget", "D) David Ausubel"],
            correct: 3,
            exp: "David Ausubel propuso que el aprendizaje real ocurre cuando la nueva estructura cognitiva se conecta con los conocimientos previos de relevancia."
        },
        {
            q: "15. ¿Qué meta se busca concretar cuando implementamos procesos de Metacognición en la sesión de aprendizaje?",
            options: ["A) Lograr la retención de datos históricos textuales para un examen rígido.", "B) Conseguir que el estudiante examine y comprenda su propia forma de aprender, evaluando sus estrategias y dificultades.", "C) Aumentar la velocidad caligráfica en los cuadernos de trabajo.", "D) Automatizar respuestas operativas mecánicas en operaciones aritméticas."],
            correct: 1,
            exp: "La metacognición es tomar conciencia de las estrategias que nos sirven para aprender, permitiendo regular el estudio de forma autónoma."
        }
    ];

    let tiempoRestante = 1200; 
    let intervaloCronometro;
    let nombreEstudiante = "";

    function comenzarExamen() {
        const inputName = document.getElementById('student-name-input').value.trim();
        if(inputName === "") {
            alert("Por favor, ingresa tu nombre completo para iniciar.");
            return;
        }
        nombreEstudiante = inputName;
        document.getElementById('sim-setup').style.display = 'none';
        
        const containerPreguntas = document.getElementById('sim-questions');
        containerPreguntas.innerHTML = "";
        
        bancoPreguntas.forEach((item, index) => {
            let opcionesHTML = "";
            item.options.forEach((opt, optIndex) => {
                opcionesHTML += `
                    <label class="sim-option-label">
                        <input type="radio" name="p-${index}" value="${optIndex}">
                        <span>${opt}</span>
                    </label>
                `;
            });
            
            containerPreguntas.innerHTML += `
                <div class="sim-question-card">
                    <div class="sim-question-text">${item.q}</div>
                    <div class="sim-options-list">
                        ${opcionesHTML}
                    </div>
                </div>
            `;
        });
        
        containerPreguntas.innerHTML += `<button class="btn-submit-sim" onclick="finalizarExamen()">Enviar Respuestas Oficiales</button>`;
        containerPreguntas.style.display = 'block';
        
        // Inicialización y ejecución del cronómetro
        intervaloCronometro = setInterval(function() {
            tiempoRestante--;
            let minutos = Math.floor(tiempoRestante / 60);
            let segundos = tiempoRestante % 60;
            
            // Solución al error de sintaxis anterior (uso correcto de variables locales)
            minutos = minutos < 10 ? '0' + minutos : minutos;
            segundos = segundos < 10 ? '0' + segundos : segundos;
            
            const cronoEl = document.getElementById('cronometro');
            if (cronoEl) {
                cronoEl.innerHTML = `<i class="fa-solid fa-clock"></i> ${minutos}:${segundos}`;
            }
            
            if (tiempoRestante <= 0) {
                clearInterval(intervaloCronometro);
                alert("Tiempo culminado. Se procesarán las alternativas marcadas.");
                finalizarExamen();
            }
        }, 1000);
    }

    function finalizarExamen() {
        clearInterval(intervaloCronometro);
        
        if(document.getElementById('sim-questions')) document.getElementById('sim-questions').style.display = 'none';
        if(document.getElementById('cronometro')) document.getElementById('cronometro').style.display = 'none';
        
        let correctas = 0;
        let respuestasUsuario = [];
        
        bancoPreguntas.forEach((item, index) => {
            const seleccionada = document.querySelector(`input[name="p-${index}"]:checked`);
            const valorRespuesta = seleccionada ? parseInt(seleccionada.value) : -1;
            respuestasUsuario.push(valorRespuesta);
            if(valorRespuesta === item.correct) {
                correctas++;
            }
        });
        
        const porcentajePrecision = Math.round((correctas / bancoPreguntas.length) * 100);
        const aprobado = porcentajePrecision >= 90; 
        
        const divResultados = document.getElementById('sim-results');
        if (!divResultados) return;
        divResultados.innerHTML = "";
        
        let bannerHTML = "";
        if(aprobado) {
            bannerHTML = `
                <div class="approved-banner">
                    <h2>¡RETO SUPREMO SUPERADO! 🏆</h2>
                    <p>Brillante desempeño, <strong>${nombreEstudiante}</strong>. Has superado el reto del aula con un puntaje de ${correctas} de ${bancoPreguntas.length}.</p>
                    <div class="score-pct">${porcentajePrecision}% de Precisión</div>
                </div>
                
                <button class="btn-print" onclick="window.print()"><i class="fa-solid fa-print"></i> Imprimir Certificado de Honor</button>
                <div class="certificate-box">
                    <h3>OFICINA DE LOGROS ACADÉMICOS VII CICLO</h3>
                    <p style="font-size:0.75rem; color:#64748b; margin-top:-5px">IESPP JESÚS DE NAZARETH</p>
                    <h4>CERTIFICADO DE EXCELENCIA</h4>
                    <p>Otorgado con honor a favor de:</p>
                    <div class="certificate-name">${nombreEstudiante}</div>
                    <p class="certificate-text">Por haber demostrado un conocimiento sobresaliente de la estructura del aula y del marco de la Formación Inicial Docente, alcanzando una métrica impecable de <strong>${porcentajePrecision}% de respuestas correctas</strong> en el Simulador Oficial.</p>
                    <div class="certificate-footer">
                        <strong>Comité Evaluador 2026</strong><br>VII Ciclo Académico
                    </div>
                </div>
            `;
        } else {
            bannerHTML = `
                <div class="approved-banner" style="background-color: #7f1d1d; border-color: var(--incorrect);">
                    <h2>RETOS NO COMPLETADOS</h2>
                    <p>Estimado(a) <strong>${nombreEstudiante}</strong>, alcanzaste un ${porcentajePrecision}%. Recuerda que la meta propuesta para este desafío es lograr el <strong>90% o más</strong> para certificar.</p>
                    <div class="score-pct" style="color:white">${porcentajePrecision}%</div>
                    <button class="btn-submit-sim" style="background-color:var(--accent); margin-top:15px; color:#000;" onclick="location.reload()">Volver a intentar el Reto</button>
                </div>
            `;
        }
        
        divResultados.innerHTML += bannerHTML;
        
        let revisionHTML = `<h3 class="review-section-title"><i class="fa-solid fa-list-check"></i> HOJA DE CALIFICACIÓN DETALLADA</h3>`;
        
        bancoPreguntas.forEach((item, index) => {
            const rUser = respuestasUsuario[index];
            const esCorrecta = rUser === item.correct;
            let respuestaTexto = rUser !== -1 ? item.options[rUser] : "Sin respuesta registrada";
            let correctaTexto = item.options[item.correct];
            
            revisionHTML += `
                <div class="review-card">
                    <span class="review-status ${esCorrecta ? 'status-correct' : 'status-incorrect'}">${esCorrecta ? 'ACIERTO' : 'FALLO'}</span>
                    <div style="font-weight: bold; margin-bottom: 8px;">${item.q}</div>
                    <div style="font-size: 0.95rem; color: ${esCorrecta ? 'var(--correct)' : 'var(--incorrect)'}">
                        <strong>Tu respuesta:</strong> ${respuestaTexto}
                    </div>
                    ${!esCorrecta ? `<div style="font-size: 0.95rem; color: var(--correct); margin-top:2px;"><strong>Respuesta correcta:</strong> ${correctaTexto}</div>` : ''}
                    <div class="review-explanation">
                        <strong>Retroalimentación:</strong> ${item.exp}
                    </div>
                </div>
            `;
        });
        
        divResultados.innerHTML += revisionHTML;
        divResultados.style.display = 'block';
    }
</script>
</body>
</html>
